<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Des-Tec | Sin Conexión</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #131926;
      --accent: #c97b3d;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: rgba(201, 123, 61, 0.15);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Soft ambient background glow */
    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(201, 123, 61, 0.05) 0%, rgba(201, 123, 61, 0) 70%);
      pointer-events: none;
      z-index: 1;
      filter: blur(50px);
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.02);
      transition: transform 0.3s ease;
    }

    .logo-container {
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      width: 80px;
      height: 80px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .wifi-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      color: var(--accent);
      display: block;
      animation: pulse 2s infinite ease-in-out;
    }

    h1 {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.025em;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 30px;
      max-width: 90%;
      margin-left: auto;
      margin-right: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px 28px;
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 12px rgba(201, 123, 61, 0.25);
    }

    .btn:hover {
      transform: translateY(-2px);
      background-color: #d88949;
      box-shadow: 0 8px 20px rgba(201, 123, 61, 0.35);
    }

    .btn:active {
      transform: translateY(0);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      border-radius: 9999px;
      margin-bottom: 24px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #ef4444;
      border-radius: 50%;
      animation: blink 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.6;
        transform: scale(0.98);
      }
      50% {
        opacity: 1;
        transform: scale(1.02);
      }
    }

    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="logo-container">
      <img src="/icons/icon-192x192.png" alt="Des-Tec Logo">
    </div>
    
    <div>
      <div class="status-badge">
        <span class="status-dot"></span>
        <span>Sin Conexión</span>
      </div>
    </div>

    <!-- WiFi Offline Icon SVG -->
    <svg class="wifi-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 21v-4.875c0-.621.504-1.125 1.125-1.125h5.25c.621 0 1.125.504 1.125 1.125V21m0 0h4.875c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h-4.875c-.621 0-1.125-.504-1.125-1.125V9.75m16.5 0V6.75A2.25 2.25 0 0018 4.5h-1.5a2.25 2.25 0 00-2.25 2.25v3m-3-3V6.75a2.25 2.25 0 00-2.25-2.25H7.5a2.25 2.25 0 00-2.25 2.25v3M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" />
    </svg>

    <h1>Actualmente no tienes conexión</h1>
    <p>La Progressive Web App de Des-Tec necesita acceso a internet para cargar datos en tiempo real. Por favor, verifica tu conexión.</p>
    
    <button class="btn" onclick="retryConnection()">Reintentar Conexión</button>
  </div>

  <script>
    function retryConnection() {
      // Show loading feedback on button
      const btn = document.querySelector('.btn');
      btn.textContent = 'Verificando...';
      btn.style.opacity = '0.7';
      btn.style.pointerEvents = 'none';

      setTimeout(() => {
        if (navigator.onLine) {
          window.location.href = '/';
        } else {
          btn.textContent = 'Reintentar Conexión';
          btn.style.opacity = '1';
          btn.style.pointerEvents = 'auto';
          
          // Flash body background as feedback
          document.body.style.backgroundColor = '#1a1012';
          setTimeout(() => {
            document.body.style.backgroundColor = '#0b0f19';
          }, 300);
        }
      }, 800);
    }

    // Auto-redirect if connection is recovered while on this page
    window.addEventListener('online', () => {
      window.location.href = '/';
    });
  </script>
</body>
</html>
